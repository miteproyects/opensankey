<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50px;
      overflow: hidden;
      background: transparent;
    }
    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 24px;
      height: 44px;
      min-width: 320px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
      transition: background 0.2s, box-shadow 0.2s;
      text-decoration: none;
      user-select: none;
    }
    .google-btn:hover {
      background: #f7f8f8;
      box-shadow: 0 1px 3px rgba(60,64,67,0.15);
    }
    .google-btn:active {
      background: #eee;
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <button class="google-btn" id="google-btn" type="button">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Continue with Google
  </button>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Default Client ID — will be overridden by Streamlit args
    var CLIENT_ID = "399215694191-jpd7hljpsgvvnnj34apjpsngfmsq4a33.apps.googleusercontent.com";
    var tokenClient = null;

    function handleCredential(accessToken) {
      // Navigate the top-level window with the access token
      try {
        var topUrl = new URL(window.top.location.href);
        var ticker = topUrl.searchParams.get("ticker") || "AAPL";
        window.top.location.href = topUrl.origin +
          "/?page=login&access_token=" + encodeURIComponent(accessToken) +
          "&ticker=" + encodeURIComponent(ticker);
      } catch (e1) {
        try {
          var parentUrl = new URL(window.parent.location.href);
          var ticker2 = parentUrl.searchParams.get("ticker") || "AAPL";
          window.parent.location.href = parentUrl.origin +
            "/?page=login&access_token=" + encodeURIComponent(accessToken) +
            "&ticker=" + encodeURIComponent(ticker2);
        } catch (e2) {
          // Last resort: postMessage
          window.parent.postMessage({
            isStreamlitMessage: true,
            type: "streamlit:setComponentValue",
            value: "access_token:" + accessToken,
            dataType: "json"
          }, "*");
        }
      }
    }

    function initOAuth() {
      if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
        setTimeout(initOAuth, 100);
        return;
      }

      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: "openid email profile",
        prompt: "select_account",
        callback: function(tokenResponse) {
          if (tokenResponse && tokenResponse.access_token) {
            handleCredential(tokenResponse.access_token);
          }
        }
      });

      // Set up the button click
      document.getElementById("google-btn").addEventListener("click", function() {
        if (tokenClient) {
          tokenClient.requestAccessToken();
        }
      });

      // Tell Streamlit frame height
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: 50
      }, "*");
    }

    // Listen for Streamlit render events to get client_id from Python
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "streamlit:render") {
        var args = event.data.args;
        if (args && args.client_id) {
          CLIENT_ID = args.client_id;
          // Re-init OAuth if the library is already loaded
          if (window.google && window.google.accounts && window.google.accounts.oauth2) {
            tokenClient = google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID,
              scope: "openid email profile",
              prompt: "select_account",
              callback: function(tokenResponse) {
                if (tokenResponse && tokenResponse.access_token) {
                  handleCredential(tokenResponse.access_token);
                }
              }
            });
          }
        }
      }
    });

    // Tell Streamlit this component is ready
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:componentReady",
      apiVersion: 1
    }, "*");

    initOAuth();
  </script>
</body>
</html>

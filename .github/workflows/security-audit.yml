# SEC-007: Automated security audit on every push and weekly
name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit safety

      - name: Run pip-audit (check for known vulnerabilities)
        run: pip-audit --require-hashes=false --strict
        continue-on-error: true

      - name: Run safety check
        run: safety check --full-report
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Simple grep-based check for common secret patterns
          echo "Checking for potential hardcoded secrets..."
          ! grep -rn --include="*.py" -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}" . \
            --exclude-dir=.git \
            --exclude="nsfe_page.py" \
            | grep -v "# noqa" \
            | grep -v "placeholder" \
            | grep -v "example" \
            | grep -v "test" || echo "Review flagged items above (may be false positives)"
